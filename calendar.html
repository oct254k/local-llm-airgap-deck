<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 일정관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 헤더/네비게이션 바 -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">📅 일정관리</h1>
            <nav class="main-nav">
                <button class="nav-tab active" data-view="calendar">캘린더</button>
                <button class="nav-tab" data-view="list">목록</button>
                <button class="nav-tab" data-view="settings">설정</button>
            </nav>
        </div>
    </header>

    <!-- 콘텐츠 영역 -->
    <main class="main-content">
        <!-- 캘린더 뷰 -->
        <section id="calendar-view" class="view active">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month">&lt;</button>
                <h2 class="current-month" id="current-month">2026년 7월</h2>
                <button class="nav-btn" id="next-month">&gt;</button>
                <div class="view-tabs">
                    <button class="view-tab active" data-view="month">월</button>
                    <button class="view-tab" data-view="week">주</button>
                    <button class="view-tab" data-view="day">일</button>
                </div>
                <button class="today-btn" id="today-btn">오늘</button>
            </div>

            <div class="calendar-grid" id="calendar-grid">
                <!-- 캘린더 그리드가 여기에 생성됨 -->
            </div>

            <button class="fab" id="add-event-btn">+</button>
        </section>

        <!-- 목록 뷰 -->
        <section id="list-view" class="view">
            <div class="list-header">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="일정 검색">
                    <button class="search-btn">🔍</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">전체</button>
                    <button class="filter-btn" data-filter="work">직무</button>
                    <button class="filter-btn" data-filter="personal">개인</button>
                    <button class="filter-btn" data-filter="health">건강</button>
                    <button class="filter-btn" data-filter="deadline">마감</button>
                </div>
            </div>

            <div class="event-list" id="event-list">
                <!-- 이벤트 목록이 여기에 생성됨 -->
            </div>

            <button class="fab fab-bottom" id="add-list-event-btn">+</button>
        </section>

        <!-- 설정 뷰 -->
        <section id="settings-view" class="view">
            <div class="settings-container">
                <h2>설정</h2>
                
                <div class="setting-section">
                    <h3>카테고리 관리</h3>
                    <div class="categories-list" id="categories-list">
                        <!-- 카테고리 목록이 여기에 생성됨 -->
                    </div>
                    <button class="add-category-btn">+ 새 카테고리 추가</button>
                </div>

                <div class="setting-section">
                    <h3>테마 설정</h3>
                    <div class="theme-toggle">
                        <label class="theme-label">
                            <input type="radio" name="theme" value="light" checked> 라이트
                        </label>
                        <label class="theme-label">
                            <input type="radio" name="theme" value="dark"> 다크
                        </label>
                    </div>
                </div>

                <div class="setting-section">
                    <h3>데이터 관리</h3>
                    <button class="export-btn">내보내기 (JSON)</button>
                    <button class="import-btn">가져오기 (JSON)</button>
                </div>
            </div>
        </section>
    </main>

    <!-- 모달 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="event-modal">
            <div class="modal-header">
                <h3 id="modal-title">일정 등록</h3>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="event-form">
                    <div class="form-group">
                        <label for="event-title">제목*</label>
                        <input type="text" id="event-title" required maxlength="100">
                        <span class="error-message" id="title-error"></span>
                    </div>
                    <div class="form-group date-time-group">
                        <label>일시</label>
                        <div class="date-time-row">
                            <input type="date" id="event-start-date">
                            <input type="time" id="event-start-time">
                        </div>
                        <div class="date-time-row">
                            <input type="date" id="event-end-date">
                            <input type="time" id="event-end-time">
                        </div>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" id="all-day-checkbox"> 종일 일정
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="event-location">장소</label>
                        <input type="text" id="event-location" maxlength="200">
                    </div>
                    <div class="form-group">
                        <label for="event-description">메모</label>
                        <textarea id="event-description" rows="3" maxlength="500"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="event-category">카테고리</label>
                        <select id="event-category">
                            <!-- 카테고리 옵션은 JS로 생성 -->
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-btn">취소</button>
                <button class="btn btn-primary" id="save-btn">저장</button>
            </div>
        </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div class="modal-overlay" id="delete-modal-overlay">
        <div class="modal delete-modal" id="delete-modal">
            <div class="modal-header">
                <h3>일정 삭제</h3>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p>이 일정을 정말 삭제하시겠습니까?</p>
                <p>(이 작업은 되돌릴 수 없습니다)</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="delete-cancel-btn">취소</button>
                <button class="btn btn-danger" id="delete-confirm-btn">삭제</button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
